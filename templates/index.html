{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="glass-panel" style="padding: 40px; text-align: center;">
    <h1 class="text-gradient">Public Issue Feed</h1>
    <p style="color: var(--text-secondary); margin-top: 10px;">
        See what's happening in your local community.
    </p>
</div>

<div id="issue-list" style="margin-top: 30px; display: grid; gap: 20px;">
    <!-- Issues will be dynamically loaded via JS -->
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/feed.js' %}"></script>
{% endblock scripts %}
